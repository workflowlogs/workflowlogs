name: Release

on:
  push:
    branches: [main]

  workflow_dispatch:
    inputs:
      version:
        description: "Version bump (patch, minor, major)"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  ci:
    name: Build check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - run: npm install
      - run: npm run build

      - name: Verify dist
        run: |
          test -f dist/nodes/N8nLogs/N8nLogs.node.js
          test -f dist/credentials/N8nLogsApi.credentials.js

  release:
    name: Release & Publish
    needs: ci
    runs-on: ubuntu-latest
    # Skip release on commits made by release-it itself
    if: "!startsWith(github.event.head_commit.message, 'chore(release)')"
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Git config
        run: |
          git config user.name "${GITHUB_ACTOR}"
          git config user.email "${GITHUB_ACTOR}@users.noreply.github.com"

      - run: npm install

      - name: Determine version bump
        id: bump
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=patch" >> $GITHUB_OUTPUT
          fi

      - name: Release
        run: npm run release -- ${{ steps.bump.outputs.version }} --ci
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
