<svg viewBox="0 0 560 320" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="560" height="320" rx="8" fill="#1e1e1e" />
  <!-- Header -->
  <circle cx="28" cy="28" r="14" fill="#2a2a2a" stroke="#444" stroke-width="1" />
  <path d="M22 26 L27 26 L29 20 L31 32 L33 24 L35 28" fill="none" stroke="#EA4B71" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
  <text x="50" y="24" fill="#fff" font-size="13" font-family="system-ui" font-weight="700">WorkflowLogs account</text>
  <text x="50" y="38" fill="#888" font-size="10" font-family="system-ui">WorkflowLogs API</text>
  <!-- Tabs -->
