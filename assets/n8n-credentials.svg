  <text x="136" y="150" fill="#888" font-size="13" font-family="system-ui">&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;</text>
  <!-- Base URL field -->
  <text x="120" y="190" fill="#ccc" font-size="12" font-family="system-ui" font-weight="500">Base URL</text>
  <rect x="120" y="198" width="420" height="36" rx="6" fill="#111" stroke="#444" stroke-width="1" />
  <text x="136" y="221" fill="#fff" font-size="12" font-family="monospace">https://api.workflowlogs.com</text>
